<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survey Form</title>
    <style>
        body{
            margin:0;
            background-color: #a9d7d1;
            text-align:center;
            font-family: Raleway,Helvetica,sans-serif;
        }
        #form-area{
            background-color: rgb(250,250,250);
            width:60%;
            margin: 0 auto;
            border:1px solid white;
        }
        .form-content{
            width: 100%;
        }
        .row{
            width: 100%;
            font-size: 0;
            margin: 16px auto;
        }
        .labels{
            display: inline-block;
            box-sizing: border-box;
            width: 40%;
            font-size: 16px;
            text-align: right;
            padding:0 8px 0 0;
            vertical-align: top;
        }
        .label-value{
            display: inline-block;
            box-sizing: border-box;
            width: 60%;
            text-align: left;
            padding:0 0 0 4px;
            vertical-align: top;
        }
        #number{
            width: 30%;
        }

        ul{
            font-size: 16px;
            list-style: none;
            margin:0;
            position:relative;
            left:-40px;
        }
        #suggestion{
            height: 50px;
            width: 60%;
        }
        #submit{
            background-color: #59ace0;
            border-radius: 4px;
            color:white;
            height:40px;
            width: 10%;
            margin: 1em auto;
        }
    </style>
</head>
<body>
<h1 id="title">请填写订单</h1>
<div id="form-area">
    <p id="description">让我们知道你的订餐信息</p>
    <form id="survey-form">
        <div class="form-content">
            <div class="row">
                <div class="labels">
                    <label id="name-label" for="name">
                        名字:
                    </label>
                </div>
                <div class="label-value">
                    <input id="name" placeholder="Enter your name" required>
                </div>
            </div>
            <div class="row">
                <div class="labels">
                    <label id="email-label" for="email">
                        邮箱:
                    </label>
                </div>
                <div class="label-value">
                    <input id="email" placeholder="Enter your Email" type="email" required>
                </div>
            </div>
            <div class="row">
                <div class="labels">
                    <label id="number-label" for="number">
                        电话:
                    </label>
                </div>
                <div class="label-value">
                    <input type="number" id="number" min=1 max=1000 placeholder="Enter your phone number" required>
                </div>
            </div>
            <div class="row">
                <div class="labels">
                    <label id="gender-label" for="dropdown">
                        性别:
                    </label>
                </div>
                <div class="label-value">
                    <select id="dropdown" name="gender" class="dropdown">
                        <option disabled value> Selected an gender</option>
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="labels">
                    <label id="Health">
                        你的口味如何？
                    </label>
                </div>
                <div class="label-value">
                    <ul>
                        <li class="ratio">
                            <label><input type="radio" value="1" name="ratio-button">辛辣</label>
                        </li>
                        <li class="ratio">
                            <label><input type="radio" value="0.5" name="ratio-button">适中</label>
                        </li>
                        <li class="ratio">
                            <label><input type="radio" value="0.1" name="ratio-button">清淡</label>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="row">
                <div class="labels">
                    <label id="Hobby">
                        你要点哪些菜呢？
                    </label>
                </div>
                <div class="label-value">
                    <ul>
                        <li class="checkbox">
                            <label><input type="checkbox" value="1" name="ratio-button">明炉烤乳猪</label>
                            <label><input type="checkbox" value="1" name="ratio-button">凉拌鲫鱼</label>
                            <label><input type="checkbox" value="3" name="ratio-button">清蒸多宝鱼</label>
                        </li>
                        <li class="checkbox">
                            <label><input type="checkbox" value="2" name="ratio-button">御品官燕</label>
                            <label><input type="checkbox" value="2" name="ratio-button">水晶虾饺</label>
                            <label><input type="checkbox" value="3" name="ratio-button">干炒牛河</label>
                        </li>
                        <li class="checkbox">
                            <label><input type="checkbox" value="3" name="ratio-button">龙王夜宴</label>
                            <label><input type="checkbox" value="3" name="ratio-button">清汤蟹丸</label>
                            <label><input type="checkbox" value="3" name="ratio-button">胡椒浸生蚝</label>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="row">
                <div class="labels">
                    <label id="Suggestion">
                        你的收货地址是？
                    </label>
                </div>
                <div class="label-value">
                    <textarea id="suggestion" placeholder="请填写地址"></textarea>
                </div>
            </div>
        </div>
        <button id="submit" type="submit">Submit</button>
    </form>
</div>


</body>
</html>
